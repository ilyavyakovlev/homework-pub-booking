<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event Flyer — Haymarket Tap</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 640px;
      margin: 40px auto;
      padding: 24px;
      background: #fafaf8;
      color: #222;
      border: 2px solid #b8860b;
      border-radius: 8px;
    }
    h1 { color: #b8860b; text-align: center; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 24px; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th { text-align: left; background: #b8860b; color: white; padding: 8px 12px; }
    td { padding: 7px 12px; border-bottom: 1px solid #ddd; }
    tr:last-child td { border-bottom: none; }
    .highlight { background: #fff8e1; font-weight: bold; }
    footer { text-align: center; font-size: 0.8em; color: #999; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>You're Invited!</h1>
  <p class="subtitle">Edinburgh Pub Night</p>

  <!-- Venue & event details -->
  <table>
    <tr><th colspan="2">Event Details</th></tr>
    <tr>
      <td>Venue</td>
      <td data-testid="venue_name">Haymarket Tap</td>
    </tr>
    <tr>
      <td>Address</td>
      <td data-testid="venue_address">12 Dalry Rd, Edinburgh EH11 2BG</td>
    </tr>
    <tr>
      <td>Date</td>
      <td data-testid="date">2026-04-25</td>
    </tr>
    <tr>
      <td>Time</td>
      <td data-testid="time">19:30</td>
    </tr>
    <tr>
      <td>Party Size</td>
      <td data-testid="party_size">6</td>
    </tr>
  </table>

  <!-- Weather summary -->
  <table>
    <tr><th colspan="2">Weather Forecast</th></tr>
    <tr>
      <td>Condition</td>
      <td data-testid="condition">cloudy</td>
    </tr>
    <tr>
      <td>Temperature</td>
      <td data-testid="temperature_c">12°C</td>
    </tr>
  </table>

  <!-- Cost breakdown — monetary values must carry the £ prefix so
       extract_money_facts() in integrity.py can find them. -->
  <table>
    <tr><th colspan="2">Cost Breakdown</th></tr>
    <tr class="highlight">
      <td>Total</td>
      <td data-testid="total_gbp">£556</td>
    </tr>
    <tr>
      <td>Deposit Required</td>
      <td data-testid="deposit_required_gbp">£111</td>
    </tr>
  </table>

  <footer>Generated by the Edinburgh Research Agent</footer>
</body>
</html>
